<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Grupo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #020617;
            color: #e2e8f0;
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
            color: #22c55e;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        h2, h3 {
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
            background: #0f172a;
            color: white;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #16a34a;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row input {
            flex: 1;
        }

        .secondary-btn {
            background: transparent;
            border: 1px solid #22c55e;
            color: #22c55e;
        }

        .secondary-btn:hover {
            background: #22c55e;
            color: white;
        }

        .user-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-btn {
            background: #7f1d1d;
        }

        .remove-btn:hover {
            background: #991b1b;
        }

        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            display: none;
            font-size: 13px;
        }

        .success {
            background: #14532d;
            color: #bbf7d0;
        }

        .error {
            background: #7f1d1d;
            color: #fecaca;
        }

        a {
            color: #22c55e;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body style="display:none;">

<div class="container">

    <h1>Crear Grupo 👥</h1>

    <!-- CREAR GRUPO -->
    <div class="card">
        <h2>Datos del grupo</h2>

        <form id="groupForm">
            <input type="text" id="name" placeholder="Nombre del grupo" required>
            <input type="text" id="description" placeholder="Descripción" required>

            <button type="submit">Crear Grupo</button>

            <div id="groupMsg" class="message"></div>
        </form>
    </div>

    <!-- AGREGAR USUARIOS -->
    <div class="card">
        <h2>Agregar miembros 🔍</h2>

        <div class="row">
            <input type="text" id="searchUsername" placeholder="Buscar username">
            <button onclick="searchUser()">Buscar</button>
            <button class="secondary-btn" onclick="addUserToList()">➕</button>
        </div>

        <p id="searchResult"></p>

        <h3>Usuarios seleccionados:</h3>
        <div id="userList"></div>

        <button style="margin-top:10px;" onclick="addAllUsersToGroup()">
            Agregar todos al grupo
        </button>

        <div id="userMsg" class="message"></div>
    </div>

    <a href="/chats">⬅ Volver</a>

</div>

<script>
    const token = sessionStorage.getItem("token");

    if (!token) {
        window.location.href = "/login";
    } else {
        document.body.style.display = "block";
    }

    let currentGroupId = null;
    let selectedUser = null;
    let selectedUsers = [];

    const groupMsg = document.getElementById("groupMsg");
    const userMsg = document.getElementById("userMsg");

    function showMessage(el, text, type) {
        el.innerText = text;
        el.className = "message " + type;
        el.style.display = "block";

        setTimeout(() => el.style.display = "none", 3000);
    }

    // CREAR GRUPO
    document.getElementById("groupForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            name: document.getElementById("name").value,
            description: document.getElementById("description").value
        };

        const response = await fetch("/groups/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            const result = await response.json();
            currentGroupId = result.id;

            showMessage(groupMsg, "Grupo creado correctamente ✅", "success");
        } else {
            showMessage(groupMsg, "Error creando grupo", "error");
        }
    });

    // BUSCAR USUARIO
    async function searchUser() {
        const username = document.getElementById("searchUsername").value;

        const response = await fetch(`/groups/users/search?username=${username}`);

        if (response.ok) {
            const user = await response.json();
            selectedUser = user;

            document.getElementById("searchResult").innerText =
                `Encontrado: ${user.username}`;
        } else {
            selectedUser = null;
            document.getElementById("searchResult").innerText = "No encontrado ❌";
        }
    }

    // AGREGAR A LISTA
    function addUserToList() {
        if (!selectedUser) {
            showMessage(userMsg, "Busca un usuario primero", "error");
            return;
        }

        if (selectedUsers.find(u => u.id === selectedUser.id)) {
            showMessage(userMsg, "Usuario ya agregado", "error");
            return;
        }

        selectedUsers.push(selectedUser);
        renderUserList();
    }

    // MOSTRAR LISTA
    function renderUserList() {
        const list = document.getElementById("userList");
        list.innerHTML = "";

        selectedUsers.forEach(user => {
            const div = document.createElement("div");
            div.classList.add("user-item");

            div.innerHTML = `
                <span>${user.username}</span>
                <button class="remove-btn">❌</button>
            `;

            div.querySelector("button").onclick = () => removeUser(user.id);

            list.appendChild(div);
        });
    }

    function removeUser(id) {
        selectedUsers = selectedUsers.filter(u => u.id !== id);
        renderUserList();
    }

    // AGREGAR AL GRUPO
    async function addAllUsersToGroup() {
        if (!currentGroupId) {
            showMessage(userMsg, "Primero crea el grupo", "error");
            return;
        }

        if (selectedUsers.length === 0) {
            showMessage(userMsg, "No hay usuarios seleccionados", "error");
            return;
        }

        for (const user of selectedUsers) {
            await fetch(`/groups/${currentGroupId}/members`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    user_id: user.id
                })
            });
        }

        showMessage(userMsg, "Usuarios agregados correctamente ✅", "success");

        selectedUsers = [];
        renderUserList();
    }
</script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>GroupsApp</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: #e2e8f0;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 320px;
            animation: fadeIn 0.5s ease;
        }

        h1 {
            margin-bottom: 10px;
            color: #22c55e;
        }

        p {
            margin-bottom: 30px;
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn {
            background: #22c55e;
            color: white;
        }

        .login-btn:hover {
            background: #16a34a;
        }

        .signup-btn {
            background: transparent;
            border: 1px solid #22c55e;
            color: #22c55e;
        }

        .signup-btn:hover {
            background: #22c55e;
            color: white;
        }

        a {
            text-decoration: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <h1>GroupsApp</h1>
        <p>Conéctate y chatea en grupo</p>

        <a href="/login">
            <button class="login-btn">Iniciar Sesión</button>
        </a>

        <a href="/signup">
            <button class="signup-btn">Registrarse</button>
        </a>

    </div>

</body>

</html>
